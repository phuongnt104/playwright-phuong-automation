name: Playwright Test & Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tests
        run: npm test
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEATHER_BASE_URL: ${{ secrets.WEATHER_BASE_URL }}
          GITHUB_API_URL: https://api.github.com

      - name: Generate Allure Report
        if: always()  # Chay du test pass hay fail
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: reports/${{ github.run_number }}

      - name: Upload HTML Report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runNumber = context.runNumber;
            const repoUrl = `https://${{ github.repository_owner }}.github.io/playwright-phuong-automation`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Report\n [View Allure Report](${repoUrl}/reports/${runNumber})`
            });

